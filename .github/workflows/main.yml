name: CI
on:
  workflow_dispatch:
  pull_request:
  push:
    branches: [master]
concurrency:
  group: ${{ github.workflow }}-${{ github.job }}-${{ github.ref }}
  cancel-in-progress: true
permissions:
  contents: read
defaults:
  run:
    shell: bash -e -l {0}
jobs:
  build-and-test:
    runs-on: ${{ matrix.os }}
    name: ${{ matrix.name }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            name: Linux
            extra-cmake-args: ""
          - os: ubuntu-latest
            name: Linux (no exceptions)
            extra-cmake-args: "-DDISABLE_EXCEPTIONS=ON"
          - os: macos-latest
            name: macOS arm
            extra-cmake-args: ""
          - os: macos-26-intel
            name: macOS intel
            extra-cmake-args: ""
          - os: windows-latest
            name: Windows
            extra-cmake-args: "-DCMAKE_BUILD_TYPE=Release"

    steps:
      - name: Setup MSVC
        if: matrix.os == 'windows-latest'
        uses: ilammy/msvc-dev-cmd@v1

      - name: Checkout code
        uses: actions/checkout@v7

      - name: Set conda environment
        uses: mamba-org/setup-micromamba@v3
        with:
          environment-name: xtensor-fftw
          init-shell: bash
          cache-downloads: true
          condarc: |
            channels:
              - conda-forge
            channel_priority: strict
          create-args: >-
            cmake
            ninja
            xtl
            xtensor>=0.27,<0.28
            fftw
            gtest

      - name: Configure using CMake
        run: cmake -G Ninja -Bbuild -DBUILD_TESTS=ON -DCMAKE_PREFIX_PATH=$CONDA_PREFIX ${{ matrix.extra-cmake-args }}

      - name: Build
        working-directory: build
        run: cmake --build . --target test_xtensor-fftw --parallel 2

      - name: Run tests (Unix)
        if: matrix.os != 'windows-latest'
        working-directory: build/test
        run: ./test_xtensor-fftw

      - name: Run tests (Windows)
        if: matrix.os == 'windows-latest'
        working-directory: build/test
        run: ./test_xtensor-fftw.exe
